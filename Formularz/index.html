<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <title>Rezerwacja pobytu</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Formularz rezerwacji pobytu</h1>
    <div id="errorBox" class="error-box hidden"></div>
    <div class="container">
      <!-- FORMULARZ -->
      <form id="reservationForm" novalidate>
        <div class="column">
          <div class="backgroundForm">
            <div id="page3">
              <h3>Dane karty płatniczej</h3>
              <div>
                <label>Numer karty (XXXX-XXXX-XXXX-XXXX): </label>
                <input type="text" id="cardNumber" />
                <span class="star hidden">*</span>
              </div>
              <div>
                <label>Ważność (MM/RR): </label>
                <input type="text" id="exp" />
                <span class="star hidden">*</span>
              </div>
              <div>
                <label>CVV2: </label>
                <input type="text" id="cvv" />
                <span class="star hidden">*</span>
              </div>
            </div>

            <div id="page2">
              <h3>Adres zamieszkania</h3>
              <div>
                <label>Kraj: </label>
                <input type="text" id="country" />
                <span class="star hidden">*</span>
              </div>
              <div>
                <label>Miasto: </label>
                <input type="text" id="city" />
                <span class="star hidden">*</span>
              </div>
              <div>
                <label>Kod pocztowy (XX-XXX): </label>
                <input type="text" id="zip" />
                <span class="star hidden">*</span>
              </div>
              <div>
                <label>Ulica i nr domu: </label>
                <input type="text" id="street" maxlength="30" />
                <span class="star hidden">*</span>
              </div>
            </div>

            <div id="page1">
              <h3>Dane główne</h3>
              <div>
                <label>Imię i nazwisko: </label>
                <input type="text" id="fullname" />
                <span class="star hidden">*</span>
              </div>
              <div>
                <label>Email: </label>
                <input type="email" id="email" />
                <span class="star hidden">*</span>
              </div>
              <div>
                <label>Powtórz email: </label>
                <input type="email" id="email2" />
                <span class="star hidden">*</span>
              </div>
              <div>
                <label>Data zameldowania: </label>
                <input type="date" id="checkin" />
                <span class="star hidden">*</span>
              </div>
              <div>
                <label>Data wymeldowania: </label>
                <input type="date" id="checkout" />
                <span class="star hidden">*</span>
              </div>
            </div>
          </div>

          <div>
            <button type="button" disabled id="backBtn">
              <span class="button_top">Back</span>
            </button>
            <button type="button" id="nextBtn">
              <span class="button_top">Next</span>
            </button>
          </div>
          <button type="submit" id="submitBtn">
            <span class="button_top">Zarejestruj się</span>
          </button>
        </div>
      </form>

      <div class="table-section">
        <h2>Osoby towarzyszące</h2>
        <button id="addRowBtn">
          <span class="button_top">Dodaj osobę</span>
        </button>
        <div class="scroll">
          <table id="personTable">
            <thead>
              <tr>
                <th>Imię i nazwisko</th>
                <th>Wiek</th>
                <th>Opiekun</th>
                <th></th>
                <th>Akcje</th>
                <th></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <p>Liczba wierszy: <span id="rowCount">0</span></p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
